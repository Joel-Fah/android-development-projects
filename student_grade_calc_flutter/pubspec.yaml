name: student_grade_calculator
description: Compute student grades from an Excel file. Export as Excel or PDF.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  excel: ^4.0.6
  file_picker: ^8.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  pdf: ^3.10.8
  printing: ^5.13.1
  google_fonts: ^6.2.1
  remixicon: ^1.4.1
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#272727"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    color_dark: "#272727"
    image: "assets/images/splash.png"
    image_dark: "assets/images/splash_dark.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_monochrome: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#272727"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true


assets:
  - assets/images/
  - assets/images/docs/