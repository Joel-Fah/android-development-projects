name: student_grade_calculator
description: Compute student grades from an Excel file. Export as Excel or PDF.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Excel ──────────────────────────────────────────────────────────────────
  excel: ^4.0.6

  # ── File picking ───────────────────────────────────────────────────────────
  file_picker: ^8.1.2

  # ── Local database ─────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # ── PDF ────────────────────────────────────────────────────────────────────
  pdf: ^3.10.8
  printing: ^5.13.1
  # ── Fonts ──────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
